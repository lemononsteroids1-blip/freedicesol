<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreeDice — Flip</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Inter", sans-serif; background: #0a0e13; color: #fff; min-height: 100vh; }
        .header { padding: 16px 24px; background: #1a1f2e; display: flex; justify-content: space-between; align-items: center; height: 78px; }
        .logo-link { display: inline-flex; align-items: center; text-decoration: none; }
        .logo-img { height: 72px; width: auto; display: block; }
        .header-left { display: flex; align-items: center; }
        .nav-tabs { display: flex; align-items: center; gap: 4px; margin-left: 24px; }
        .nav-tab { display: inline-flex; align-items: center; gap: 7px; padding: 8px 16px; border-radius: 8px; font-size: 14px; font-weight: 600; color: #8b949e; text-decoration: none; border: none; background: none; cursor: pointer; transition: all 0.15s; position: relative; }
        .nav-tab:hover { background: #2a2f3e; color: #fff; }
        .nav-tab.active { background: #2a2f3e; color: #fff; }
        .nav-tab .dropdown { display: none; position: absolute; top: 100%; left: 0; padding-top: 8px; min-width: 160px; z-index: 100; }
        .nav-tab:hover .dropdown { display: flex; flex-direction: column; }
        .dropdown-inner { background: #1a1f2e; border: 1px solid #2a2f3e; border-radius: 10px; padding: 6px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); display: flex; flex-direction: column; }
        .dropdown-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 7px; color: #cdd5e0; font-size: 14px; font-weight: 600; text-decoration: none; transition: background 0.15s; }
        .dropdown-item:hover { background: #2a2f3e; color: #fff; }
        .balance-display { background: #2a2f3e; border: 1px solid #3a3f4e; border-radius: 8px; padding: 12px 24px; display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 16px; color: #fff; height: 48px; }
        .balance-amount { color: #fff; }
        .deposit-btn { background: #1e40af; border: none; border-radius: 8px; padding: 12px 24px; color: #fff; font-weight: 600; cursor: pointer; font-size: 16px; transition: all 0.2s ease; height: 48px; }
        .deposit-btn:hover { background: #1d4ed8; }
        .main-content { display: flex; height: calc(100vh - 78px); }
        .bet-panel { width: 280px; background: #1a1f2e; padding: 24px; display: flex; flex-direction: column; gap: 20px; flex-shrink: 0; overflow-y: auto; }
        .section-title { color: #8b949e; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .bet-input { background: #2a2f3e; border: 1px solid #3a3f4e; border-radius: 8px; padding: 12px 16px; color: #fff; font-size: 16px; font-weight: 600; width: 100%; }
        .bet-input:focus { outline: none; border-color: #1e40af; box-shadow: 0 0 0 3px rgba(30,64,175,0.1); }
        .quick-bets { display: flex; gap: 8px; }
        .quick-bet { flex: 1; background: #2a2f3e; border: 1px solid #3a3f4e; border-radius: 8px; padding: 10px; color: #8b949e; font-size: 13px; font-weight: 600; cursor: pointer; text-align: center; transition: all 0.2s ease; }
        .quick-bet:hover { background: #3a3f4e; color: #fff; }
        .side-picker { display: flex; gap: 8px; }
        .side-btn { flex: 1; background: #2a2f3e; border: 2px solid #3a3f4e; border-radius: 8px; padding: 14px 10px; color: #8b949e; font-size: 13px; font-weight: 700; cursor: pointer; text-align: center; transition: all 0.15s; display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .side-btn:hover { background: #3a3f4e; color: #fff; }
        .side-btn.selected { border-color: #f59e0b; background: rgba(245,158,11,0.12); color: #f59e0b; }
        .side-btn .side-icon { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
        .side-btn .side-icon-yellow { background: radial-gradient(circle at 35% 30%, #fef08a, #fbbf24 45%, #d97706); border: 2px solid #f59e0b; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .side-btn .side-icon-white { background: radial-gradient(circle at 35% 30%, #f9fafb, #e5e7eb 45%, #9ca3af); border: 2px solid #d1d5db; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .side-btn .side-icon-yellow img, .side-btn .side-icon-white img { width: 24px; height: 24px; object-fit: contain; }

        .payout-box { text-align: center; margin-bottom: 8px; }
        .payout-label { color: #fff; font-size: 11px; font-weight: 500; text-transform: uppercase; margin-bottom: 8px; }
        .payout-value { color: #fff; font-size: 20px; font-weight: 700; }
        .roll-button { background: #1e40af; border: none; border-radius: 8px; padding: 20px; color: #fff; font-weight: 700; font-size: 18px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; margin-top: auto; transition: all 0.2s ease; }
        .roll-button:hover:not(:disabled) { background: #1d4ed8; transform: translateY(-1px); }
        .roll-button:disabled { background: #4a5568; cursor: not-allowed; transform: none; }

        .game-area { flex: 1; background: #0a0e13; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; gap: 36px; }

        /* Coin */
        .coin-wrap { perspective: 1000px; }
        .coin { width: 160px; height: 160px; position: relative; transform-style: preserve-3d; }
        .coin-face {
            position: absolute; inset: 0; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            backface-visibility: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        .coin-heads {
            background: radial-gradient(circle at 35% 30%, #fef08a, #fbbf24 45%, #d97706);
            border: 5px solid #f59e0b;
        }
        .coin-heads img {
            width: 100px; height: 100px; object-fit: contain;
            filter: drop-shadow(0 2px 4px rgba(120,60,0,0.4));
        }
        .coin-tails {
            background: radial-gradient(circle at 35% 30%, #f9fafb, #e5e7eb 45%, #9ca3af);
            border: 5px solid #d1d5db;
            transform: rotateY(180deg);
        }
        .coin-tails img {
            width: 100px; height: 100px; object-fit: contain;
            filter: drop-shadow(0 2px 4px rgba(80,80,80,0.3)) grayscale(20%);
        }

        @keyframes flipSpin {
            0%   { transform: rotateY(0deg); }
            100% { transform: rotateY(1800deg); }
        }
        @keyframes flipSpinTails {
            0%   { transform: rotateY(0deg); }
            100% { transform: rotateY(1980deg); }
        }
        .coin.flipping-heads { animation: flipSpin 1.1s cubic-bezier(0.4,0,0.2,1) forwards; }
        .coin.flipping-tails { animation: flipSpinTails 1.1s cubic-bezier(0.4,0,0.2,1) forwards; }
        .coin.show-heads { transform: rotateY(0deg); }
        .coin.show-tails { transform: rotateY(180deg); }



        .stat-row { display: grid; grid-template-columns: 1fr; gap: 12px; width: 100%; max-width: 560px; }
        .stat-box { background: #2a2f3e; border: 1px solid #3a3f4e; border-radius: 8px; padding: 16px; text-align: center; display: flex; flex-direction: column; justify-content: center; min-height: 80px; }
        .stat-label { color: #8b949e; font-size: 11px; font-weight: 600; text-transform: uppercase; margin-bottom: 6px; letter-spacing: 0.4px; }
        .stat-value { color: #fff; font-size: 16px; font-weight: 700; }
        .stat-value.green { color: #48bb78; }
        .stat-value.red { color: #f56565; }

        .toast { position: fixed; top: 80px; right: 20px; background: #1a1f2e; border: 1px solid #2a2f3e; border-radius: 8px; padding: 12px 16px; color: #fff; font-size: 14px; font-weight: 500; z-index: 1000; animation: slideIn 0.3s ease-out; }
        .toast.success { border-color: #48bb78; background: rgba(72,187,120,0.1); }
        .toast.error { border-color: #f56565; background: rgba(245,101,101,0.1); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <a class="logo-link" href="/"><img class="logo-img" src="/assets/Free Dice.png" alt="FreeDice"></a>
            <nav class="nav-tabs">
                <div class="nav-tab">
                    Originals
                    <div class="dropdown">
                        <div class="dropdown-inner">
                            <a class="dropdown-item" href="/blackjack">Blackjack</a>
                            <a class="dropdown-item" href="/dice">Dice</a>
                            <a class="dropdown-item" href="/flip">Flip</a>
                            <a class="dropdown-item" href="/plinko">Plinko</a>
                        </div>
                    </div>
                </div>
                <a class="nav-tab" href="/faq">FAQ</a>
            </nav>
        </div>
        <div style="display:flex;align-items:center;gap:16px;">
            <div class="balance-display">
                <img src="https://raw.githubusercontent.com/solana-labs/token-list/main/assets/mainnet/So11111111111111111111111111111111111111112/logo.png" style="width:18px;height:18px;border-radius:50%;flex-shrink:0;">
                <span class="balance-amount" id="balance">0.0000 SOL</span>
            </div>
            <button class="deposit-btn" id="walletBtn">Connect Wallet</button>
        </div>
    </header>

    <div class="main-content">
        <div class="bet-panel">
            <div>
                <div class="section-title">Bet Amount</div>
                <div style="position:relative;">
                  <img src="https://raw.githubusercontent.com/solana-labs/token-list/main/assets/mainnet/So11111111111111111111111111111111111111112/logo.png" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);width:18px;height:18px;border-radius:50%;pointer-events:none;">
                  <input type="number" class="bet-input" id="betAmount" value="0.0000" step="0.0001" min="0" style="padding-left:38px;">
                </div>
            </div>
            <div class="quick-bets">
                <button class="quick-bet" onclick="halveBet()">1/2</button>
                <button class="quick-bet" onclick="doubleBet()">2x</button>
                <button class="quick-bet" onclick="maxBet()">MAX</button>
            </div>
            <div>
                <div class="section-title">Pick Side</div>
                <div class="side-picker">
                    <button class="side-btn selected" id="btnHeads" onclick="selectSide('heads')">
                        <div class="side-icon-yellow"><img src="/assets/cflogo.png" alt="Heads"></div>
                        Heads
                    </button>
                    <button class="side-btn" id="btnTails" onclick="selectSide('tails')">
                        <div class="side-icon-white"><img src="/assets/cflogo.png" alt="Tails"></div>
                        Tails
                    </button>
                </div>
            </div>
            <div class="payout-box">
                <div class="payout-label">Profit on Win</div>
                <div class="payout-value" id="payout">0.0000 SOL</div>
            </div>
            <button class="roll-button" id="flipBtn" onclick="handleFlipBtn()">Flip</button>
        </div>

        <div class="game-area">
            <div class="coin-wrap" id="coinWrap">
                <div class="coin show-heads" id="coin">
                    <div class="coin-face coin-heads"><img src="/assets/cflogo.png" alt="Heads"></div>
                    <div class="coin-face coin-tails"><img src="/assets/cflogo.png" alt="Tails"></div>
                </div>
            </div>


        </div>
    </div>

    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <script src="/js/solana.js"></script>
    <script>
        const MULTIPLIER = 1.98;
        let balance = 0;
        let walletConnected = false;
        let selectedSide = 'heads';
        let flipping = false;

        function formatSol(a) { return Number(a).toFixed(4) + " SOL"; }

        function showToast(message, type) {
            document.querySelectorAll('.toast').forEach(t => t.remove());
            const t = document.createElement("div");
            t.className = `toast ${type}`;
            t.textContent = message;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        function updateBalance() { document.getElementById("balance").textContent = formatSol(balance); }

        function updatePayout() {
            const bet = parseFloat(document.getElementById("betAmount").value) || 0;
            document.getElementById("payout").textContent = formatSol(bet * (MULTIPLIER - 1));
        }

        function selectSide(side) {
            selectedSide = side;
            document.getElementById("btnHeads").className = "side-btn" + (side === "heads" ? " selected" : "");
            document.getElementById("btnTails").className = "side-btn" + (side === "tails" ? " selected" : "");
        }

        function halveBet()  { const v = parseFloat(document.getElementById("betAmount").value)||0; document.getElementById("betAmount").value=(v/2).toFixed(4); updatePayout(); }
        function doubleBet() { const v = parseFloat(document.getElementById("betAmount").value)||0; document.getElementById("betAmount").value=Math.min(v*2,balance).toFixed(4); updatePayout(); }
        function maxBet()    { document.getElementById("betAmount").value=balance.toFixed(4); updatePayout(); }

        function handleFlipBtn() { runFlip(); }

        async function runFlip() {
            if (flipping) return;
            const btn = document.getElementById("flipBtn");
            if (!FreeDiceSolana.isConnected()) {
                try { await FreeDiceSolana.ensureWallet(); walletConnected = true; const addr = FreeDiceSolana.getPublicKey(); document.getElementById("walletBtn").textContent = addr.slice(0,4)+'...'+addr.slice(-4); balance = await FreeDiceSolana.getSolBalance(); updateBalance(); } catch(e) { showToast(e.message||'Connect wallet first','error'); return; }
            }
            if (!walletConnected) walletConnected = true;
            const bet = parseFloat(document.getElementById("betAmount").value) || 0;
            if (bet < 0) { showToast("Invalid bet amount", "error"); return; }
            if (bet > 0 && bet < 0.001) { showToast("Minimum bet is 0.001 SOL", "error"); return; }
            if (bet > balance) { showToast("Insufficient balance", "error"); return; }

            flipping = true;
            const btn = document.getElementById("flipBtn");
            btn.disabled = true;

            const coin = document.getElementById("coin");
            const wrap = document.getElementById("coinWrap");
            wrap.className = "coin-wrap";
            coin.className = "coin flipping-heads";

            try {
                const wallet = FreeDiceSolana.getPublicKey();
                let sig = null;
                if (bet > 0) {
                    btn.textContent = 'Confirm in wallet...';
                    const result = await FreeDiceSolana.placeBetOnChain('flip', bet);
                    sig = result.sig;
                }
                const res = await fetch("/api/flip", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ wallet, bet, side: selectedSide, sig })
                });
                const data = await res.json();

                if (data.error) {
                    showToast(data.error, "error");
                    coin.className = "coin show-heads";
                    flipping = false;
                    btn.disabled = false;
                    return;
                }

                // Restart animation landing on correct face
                coin.className = "coin";
                void coin.offsetWidth; // force reflow to restart animation
                coin.className = "coin " + (data.result === "heads" ? "flipping-heads" : "flipping-tails");

                setTimeout(async () => {
                    coin.className = "coin " + (data.result === "heads" ? "show-heads" : "show-tails");
                    wrap.className = "coin-wrap";
                    balance = await FreeDiceSolana.getSolBalance();
                    updateBalance();
                    const profit = bet * (MULTIPLIER - 1);
                    showToast(data.won ? `+${formatSol(profit)}` : `-${formatSol(bet)}`, data.won ? "success" : "error");
                    flipping = false;
                    btn.disabled = false;
                    btn.textContent = 'Flip';
                }, 1150);

            } catch(e) {
                showToast(e.message || "Flip failed", "error");
                coin.className = "coin show-heads";
                flipping = false;
                btn.disabled = false;
            }
        }

        async function connectWallet() {
            try {
                await FreeDiceSolana.connectWallet();
                walletConnected = true;
                const addr = FreeDiceSolana.getPublicKey();
                document.getElementById("walletBtn").textContent = addr.slice(0,4)+"..."+addr.slice(-4);
                balance = await FreeDiceSolana.getSolBalance();
                updateBalance();
                showToast("Wallet connected", "success");
            } catch(e) { showToast(e.message || "Wallet connection failed", "error"); }
        }

        window.addEventListener("load", async () => {
            await FreeDiceSolana.initSolana();
            document.getElementById("walletBtn").addEventListener("click", connectWallet);
            document.getElementById("betAmount").addEventListener("input", updatePayout);
            if (FreeDiceSolana.isConnected()) {
                walletConnected = true;
                const addr = FreeDiceSolana.getPublicKey();
                document.getElementById("walletBtn").textContent = addr.slice(0,4)+"..."+addr.slice(-4);
                balance = await FreeDiceSolana.getSolBalance();
                updateBalance();
            }
            updatePayout();
        });
    </script>
</body>
</html>
