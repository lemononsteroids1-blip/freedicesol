<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreeDice</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Inter", sans-serif; background: #0a0e13; color: #fff; min-height: 100vh; }
        .header { padding: 16px 24px; background: #1a1f2e; display: flex; justify-content: space-between; align-items: center; height: 78px; }
        .logo-link { display: inline-flex; align-items: center; text-decoration: none; }
        .logo-img { height: 72px; width: auto; display: block; }
        .header-left { display: flex; align-items: center; }
        .nav-tabs { display: flex; align-items: center; gap: 4px; margin-left: 24px; }
        .nav-tab { display: inline-flex; align-items: center; gap: 7px; padding: 8px 16px; border-radius: 8px; font-size: 14px; font-weight: 600; color: #8b949e; text-decoration: none; border: none; background: none; cursor: pointer; transition: all 0.15s; position: relative; }
        .nav-tab:hover { background: #2a2f3e; color: #fff; }
        .nav-tab.active { background: #2a2f3e; color: #fff; }
        .nav-tab .dropdown { display: none; position: absolute; top: 100%; left: 0; padding-top: 8px; min-width: 160px; z-index: 100; }
        .nav-tab:hover .dropdown { display: flex; flex-direction: column; }
        .dropdown-inner { background: #1a1f2e; border: 1px solid #2a2f3e; border-radius: 10px; padding: 6px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); display: flex; flex-direction: column; }
        .dropdown-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 7px; color: #cdd5e0; font-size: 14px; font-weight: 600; text-decoration: none; transition: background 0.15s; }
        .dropdown-item:hover { background: #2a2f3e; color: #fff; }
        .balance-display { background: #2a2f3e; border: 1px solid #3a3f4e; border-radius: 8px; padding: 12px 24px; display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 16px; color: #fff; height: 48px; }
        .balance-amount { color: #fff; }
        .deposit-btn { background: #1e40af; border: none; border-radius: 8px; padding: 12px 24px; color: #fff; font-weight: 600; cursor: pointer; font-size: 16px; transition: all 0.2s ease; height: 48px; }
        .deposit-btn:hover { background: #1d4ed8; }
        .main-content { display: flex; height: calc(100vh - 78px); }
        .bet-panel { width: 280px; background: #1a1f2e; padding: 24px; display: flex; flex-direction: column; gap: 20px; }
        .section-title { color: #8b949e; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .bet-input, .stat-input { background: #2a2f3e; border: 1px solid #3a3f4e; border-radius: 8px; padding: 12px 16px; color: #fff; font-size: 16px; font-weight: 600; width: 100%; font-family: "Inter", sans-serif; }
        .bet-input:focus, .stat-input:focus { outline: none; border-color: #1e40af; box-shadow: 0 0 0 3px rgba(30, 64, 175, 0.1); }
        .quick-bets { display: flex; gap: 8px; }
        .quick-bet { flex: 1; background: #2a2f3e; border: 1px solid #3a3f4e; border-radius: 8px; padding: 10px; color: #8b949e; font-size: 13px; font-weight: 600; cursor: pointer; text-align: center; transition: all 0.2s ease; }
        .quick-bet:hover { background: #3a3f4e; color: #fff; }
        .payout-box { text-align: center; margin-bottom: 8px; }
        .payout-label { color: #fff; font-size: 11px; font-weight: 500; text-transform: uppercase; margin-bottom: 8px; }
        .payout-value { color: #fff; font-size: 20px; font-weight: 700; }
        .roll-button { background: #1e40af; border: none; border-radius: 8px; padding: 20px; color: #fff; font-weight: 700; font-size: 18px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; margin-top: auto; transition: all 0.2s ease; }
        .roll-button:hover:not(:disabled) { background: #1d4ed8; transform: translateY(-1px); }
        .roll-button:disabled { background: #4a5568; cursor: not-allowed; transform: none; }
        .game-area { flex: 1; background: #0a0e13; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
        .dice-slider { width: 100%; max-width: 800px; position: relative; margin: 32px auto; }
        .slider-track { height: 24px; background: #f56565; border-radius: 12px; position: relative; cursor: pointer; overflow: visible; }
        .win-area { position: absolute; top: 0; height: 100%; background: #48bb78; border-radius: 12px; transition: none; }
        .result-line { position: absolute; top: -6px; width: 2px; height: 36px; background: #fff; border-radius: 1px; z-index: 5; opacity: 0; transition: left 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.2s ease; }
        .result-line.show { opacity: 1; }
        .result-line::after { content: attr(data-result); position: absolute; top: -25px; left: 50%; transform: translateX(-50%); background: #1a1f2e; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; white-space: nowrap; }
        .slider-handle { position: absolute; top: -12px; width: 48px; height: 48px; background: #fff; border: 2px solid #ccc; border-radius: 50%; cursor: grab; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; color: #000; box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2); z-index: 10; }
        .slider-labels { display: flex; justify-content: space-between; margin-top: 12px; color: #8b949e; font-size: 11px; font-weight: 500; }
        .stat-row { display: grid; grid-template-columns: 1fr auto 1fr; gap: 12px; margin-top: 20px; align-items: center; }
        .stat-box { background: #2a2f3e; border: 1px solid #3a3f4e; border-radius: 8px; padding: 16px; text-align: center; min-height: 92px; display: flex; flex-direction: column; justify-content: center; }
        .stat-label { color: #fff; font-size: 11px; font-weight: 500; text-transform: uppercase; margin-bottom: 6px; }
        .stat-value { color: #fff; font-size: 16px; font-weight: 700; }
        .toast { position: fixed; top: 80px; right: 20px; background: #1a1f2e; border: 1px solid #2a2f3e; border-radius: 8px; padding: 12px 16px; color: #fff; font-size: 14px; font-weight: 500; z-index: 1000; animation: slideIn 0.3s ease-out; }
        .toast.success { border-color: #48bb78; background: rgba(72, 187, 120, 0.1); }
        .toast.error { border-color: #f56565; background: rgba(245, 101, 101, 0.1); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <a class="logo-link" href="/">
                <img class="logo-img" src="/assets/Free Dice.png" alt="FreeDice">
            </a>
            <nav class="nav-tabs">
                <div class="nav-tab">
                    Originals
                    <div class="dropdown">
                        <div class="dropdown-inner">
                            <a class="dropdown-item" href="/blackjack">Blackjack</a>
                            <a class="dropdown-item" href="/dice">Dice</a>
                            <a class="dropdown-item" href="/flip">Flip</a>
                            <a class="dropdown-item" href="/plinko">Plinko</a>
                        </div>
                    </div>
                </div>
                <a class="nav-tab" href="/faq">FAQ</a>
            </nav>
        </div>
        <div style="display:flex;align-items:center;gap:16px;">
            <div class="balance-display"><img src="https://raw.githubusercontent.com/solana-labs/token-list/main/assets/mainnet/So11111111111111111111111111111111111111112/logo.png" style="width:18px;height:18px;border-radius:50%;flex-shrink:0;"><span class="balance-amount" id="balance">0.0000 SOL</span></div>
            <button class="deposit-btn" id="walletBtn">Connect Wallet</button>
        </div>
    </header>

    <div class="main-content">
        <div class="bet-panel">
            <div>
                <div class="section-title">Bet Amount</div>
                <div style="position:relative;">
                  <img src="https://raw.githubusercontent.com/solana-labs/token-list/main/assets/mainnet/So11111111111111111111111111111111111111112/logo.png" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);width:18px;height:18px;border-radius:50%;pointer-events:none;">
                  <input type="number" class="bet-input" id="betAmount" value="0.0000" step="0.0001" style="padding-left:38px;">
                </div>
            </div>
            <div class="quick-bets">
                <button class="quick-bet" onclick="halveBet()">1/2</button>
                <button class="quick-bet" onclick="doubleBet()">2x</button>
                <button class="quick-bet" onclick="maxBet()">MAX</button>
            </div>
            <div class="payout-box">
                <div class="payout-label">Profit on Win</div>
                <div class="payout-value" id="payout">0.0000 SOL</div>
            </div>
            <button class="roll-button" id="rollBtn" onclick="roll()">Roll</button>
        </div>

        <div class="game-area">
            <div class="dice-slider">
                <div class="slider-track" id="track">
                    <div class="win-area" id="winArea"></div>
                    <div class="result-line" id="resultLine"></div>
                    <div class="slider-handle" id="handle"></div>
                </div>
                <div class="slider-labels"><span>0</span><span>20</span><span>40</span><span>60</span><span>80</span><span>100</span></div>
            </div>
            <div class="stat-row">
                <div class="stat-box">
                    <div class="stat-label">Multiplier</div>
                    <input type="text" class="stat-input stat-value" id="multiplier" value="2.00" onchange="updateFromMultiplier()">
                </div>
                <div class="stat-box" style="cursor:pointer;" onclick="toggleMode()">
                    <div class="stat-label">Mode</div>
                    <div class="stat-value" id="modeToggle">UNDER</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Win Chance</div>
                    <input type="text" class="stat-input stat-value" id="winChance" value="50.00" onchange="updateFromWinChance()">
                </div>
            </div>

        </div>
    </div>

    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <script src="/js/solana.js"></script>
    <script>
        let balance = 0;
        let wallet = null;
        let target = 51.0;
        let mode = "over";
        let isDragging = false;
        let walletConnected = false;

        function formatSol(a) { return Number(a).toFixed(4) + " SOL"; }
        function showToast(message, type) {
            const toast = document.createElement("div");
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        async function connectWallet() {
            try {
                await FreeDiceSolana.connectWallet();
                walletConnected = true;
                wallet = FreeDiceSolana.getPublicKey();
                document.getElementById("walletBtn").textContent = wallet.slice(0,4) + '...' + wallet.slice(-4);
                balance = await FreeDiceSolana.getSolBalance();
                updateBalance();
                updateStats();
                showToast("Wallet connected", "success");
            } catch (e) {
                showToast(e.message || "Wallet connection failed", "error");
            }
        }

        function updateBalance() {
            document.getElementById("balance").textContent = formatSol(balance);
        }

        function updateStats() {
            const bet = parseFloat(document.getElementById("betAmount").value) || 0;
            const winChance = mode === "under" ? target : 100 - target;
            const multiplier = 98 / winChance; // 98% RTP
            const profit = bet * (multiplier - 1);
            document.getElementById("winChance").value = winChance.toFixed(2);
            document.getElementById("multiplier").value = multiplier.toFixed(2);
            document.getElementById("payout").textContent = formatSol(profit);
            document.getElementById("modeToggle").textContent = mode.toUpperCase();
            updateSlider();
        }

        function updateSlider() {
            const winArea = document.getElementById("winArea");
            const handle = document.getElementById("handle");
            if (mode === "under") {
                winArea.style.left = "0%";
                winArea.style.width = target + "%";
            } else {
                winArea.style.left = target + "%";
                winArea.style.width = (100 - target) + "%";
            }
            handle.style.left = `calc(${target}% - 24px)`;
            handle.textContent = target.toFixed(2);
        }

        function updateFromMultiplier() {
            const multiplier = Math.max(1.01, parseFloat(document.getElementById("multiplier").value) || 2);
            const newWinChance = Math.min(98, 100 / multiplier);
            target = mode === "under" ? newWinChance : 100 - newWinChance;
            updateStats();
        }

        function updateFromWinChance() {
            const winChance = Math.max(2, Math.min(98, parseFloat(document.getElementById("winChance").value) || 50));
            target = mode === "under" ? winChance : 100 - winChance;
            updateStats();
        }

        function toggleMode() {
            const currentWinChance = mode === "under" ? target : 100 - target;
            mode = mode === "under" ? "over" : "under";
            target = mode === "under" ? currentWinChance : 100 - currentWinChance;
            updateStats();
        }

        function halveBet() {
            const current = parseFloat(document.getElementById("betAmount").value) || 0;
            document.getElementById("betAmount").value = (current / 2).toFixed(2);
            updateStats();
        }

        function doubleBet() {
            const current = parseFloat(document.getElementById("betAmount").value) || 0;
            document.getElementById("betAmount").value = Math.min(current * 2, balance).toFixed(2);
            updateStats();
        }

        function maxBet() {
            document.getElementById("betAmount").value = balance.toFixed(2);
            updateStats();
        }

        function showResultLine(result) {
            const line = document.getElementById("resultLine");
            line.style.left = `calc(${result}% - 1px)`;
            line.setAttribute("data-result", result.toFixed(2));
            line.classList.add("show");
        }

        async function roll() {
            const btn = document.getElementById("rollBtn");
            if (btn.disabled) return;
            if (!FreeDiceSolana.isConnected()) {
                try { await FreeDiceSolana.ensureWallet(); wallet = FreeDiceSolana.getPublicKey(); walletConnected = true; document.getElementById("walletBtn").textContent = wallet.slice(0,4)+'...'+wallet.slice(-4); balance = await FreeDiceSolana.getSolBalance(); updateBalance(); } catch(e) { showToast(e.message||'Connect wallet first','error'); return; }
            }
            if (!wallet) wallet = FreeDiceSolana.getPublicKey();
            const bet = parseFloat(document.getElementById("betAmount").value) || 0;
            if (bet < 0) { showToast("Invalid bet amount", "error"); return; }
            if (bet > 0 && bet < 0.001) { showToast("Minimum bet is 0.001 SOL", "error"); return; }
            if (bet > balance) { showToast("Insufficient balance", "error"); return; }
            try {
                let sig = null;
                if (bet > 0) {
                    btn.textContent = 'Confirm in wallet...';
                    const result = await FreeDiceSolana.placeBetOnChain('dice', bet);
                    sig = result.sig;
                }
                btn.textContent = 'Rolling...';
                const res = await fetch("/api/dice/roll", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ wallet, bet, target, mode, sig })
                });
                const data = await res.json();
                if (data.error) { showToast(data.error, "error"); return; }

                const winChance = mode === "under" ? target : 100 - target;
                const multiplier = 98 / winChance;
                const profit = bet * (multiplier - 1);

                showResultLine(data.result);
                balance = await FreeDiceSolana.getSolBalance();
                updateBalance();
                updateStats();
                showToast(data.won ? `+${formatSol(profit)}` : `-${formatSol(bet)}`, data.won ? "success" : "error");
            } catch (e) {
                showToast(e.message || "Roll failed", "error");
            } finally {
                btn.disabled = false;
            }
        }

        function initSlider() {
            const track = document.getElementById("track");
            const handle = document.getElementById("handle");
            track.addEventListener("click", (e) => {
                if (isDragging) return;
                const rect = track.getBoundingClientRect();
                target = Math.max(2, Math.min(98, ((e.clientX - rect.left) / rect.width) * 100));
                updateStats();
            });
            handle.addEventListener("mousedown", (e) => { isDragging = true; e.preventDefault(); });
            document.addEventListener("mousemove", (e) => {
                if (!isDragging) return;
                const rect = track.getBoundingClientRect();
                target = Math.max(2, Math.min(98, ((e.clientX - rect.left) / rect.width) * 100));
                updateStats();
            });
            document.addEventListener("mouseup", () => { isDragging = false; });
        }

        window.addEventListener("load", async () => {
            await FreeDiceSolana.initSolana();
            document.getElementById("walletBtn").addEventListener("click", connectWallet);
            document.getElementById("betAmount").addEventListener("input", updateStats);
            if (FreeDiceSolana.isConnected()) {
                walletConnected = true;
                wallet = FreeDiceSolana.getPublicKey();
                document.getElementById("walletBtn").textContent = wallet.slice(0,4) + '...' + wallet.slice(-4);
                balance = await FreeDiceSolana.getSolBalance();
                updateBalance();
            }
            const ref = new URLSearchParams(location.search).get('ref') || localStorage.getItem('fd_ref');
            if (ref && wallet) fetch('/api/referral/register', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ wallet, ref }) });
            updateStats();
            initSlider();
        });
    </script>
</body>
</html>
