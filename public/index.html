<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FreeDice Casino</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: "Inter", sans-serif; background: #0a0e13; color: #fff; min-height: 100vh; }

/* Header */
.header { padding: 0 24px; background: #1a1f2e; display: flex; justify-content: space-between; align-items: center; height: 78px; position: sticky; top: 0; z-index: 50; }
.header-left { display: flex; align-items: center; }
.logo-link { display: inline-flex; align-items: center; text-decoration: none; }
.logo-img { height: 72px; width: auto; display: block; }
.nav-tabs { display: flex; align-items: center; gap: 4px; margin-left: 24px; }
.nav-tab { display: inline-flex; align-items: center; padding: 8px 16px; border-radius: 8px; font-size: 14px; font-weight: 600; color: #8b949e; text-decoration: none; border: none; background: none; cursor: pointer; transition: all 0.15s; position: relative; }
.nav-tab:hover { background: #2a2f3e; color: #fff; }
.nav-tab .dropdown { display: none; position: absolute; top: 100%; left: 0; padding-top: 8px; min-width: 160px; z-index: 100; }
.nav-tab:hover .dropdown { display: flex; flex-direction: column; }
.dropdown-inner { background: #1a1f2e; border: 1px solid #2a2f3e; border-radius: 10px; padding: 6px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); display: flex; flex-direction: column; }
.dropdown-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 7px; color: #cdd5e0; font-size: 14px; font-weight: 600; text-decoration: none; transition: background 0.15s; }
.dropdown-item:hover { background: #2a2f3e; color: #fff; }
.header-right { display: flex; align-items: center; gap: 12px; }
.balance-display { background: #2a2f3e; border: 1px solid #3a3f4e; border-radius: 8px; padding: 10px 18px; display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 15px; color: #fff; height: 44px; }
.connect-btn { background: #1e40af; border: none; border-radius: 8px; padding: 10px 22px; color: #fff; font-weight: 600; cursor: pointer; font-size: 15px; height: 44px; transition: background 0.2s; }
.connect-btn:hover { background: #1d4ed8; }

/* Main */
main { max-width: 1100px; margin: 0 auto; padding: 40px 24px 60px; }

/* Layout with chat */
.page-layout { display: flex; align-items: flex-start; min-height: calc(100vh - 78px); }
.page-content { flex: 1; min-width: 0; padding: 40px 32px 60px; }

/* Chat popup */
.chat-popup { position: fixed; bottom: 0; right: 0; width: 380px; background: #0d1117; border-radius: 20px 0 0 0; display: flex; flex-direction: column; height: 600px; box-shadow: -8px 0 48px rgba(0,0,0,0.8); border-top: 1px solid #21262d; border-left: 1px solid #21262d; z-index: 200; transform: translateY(110%); opacity: 0; pointer-events: none; transition: transform 0.3s cubic-bezier(0.4,0,0.2,1), opacity 0.3s; transform-origin: bottom right; }
.chat-popup.open { transform: translateY(0); opacity: 1; pointer-events: all; }
.chat-header { padding: 18px 20px 14px; border-bottom: 1px solid #21262d; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.chat-header-left { display: flex; align-items: center; gap: 10px; }
.chat-header-icon { width: 32px; height: 32px; background: linear-gradient(135deg, #1e40af, #7c3aed); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
.chat-header-icon svg { width: 16px; height: 16px; color: #fff; }
.chat-header-title { font-size: 15px; font-weight: 800; color: #f0f6fc; letter-spacing: 0.3px; }
.chat-online { font-size: 11px; font-weight: 600; color: #3fb950; display: flex; align-items: center; gap: 5px; }
.chat-online::before { content: ''; width: 6px; height: 6px; background: #3fb950; border-radius: 50%; display: inline-block; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.chat-close { background: none; border: none; color: #6e7681; cursor: pointer; padding: 4px; border-radius: 6px; display: flex; transition: color 0.15s, background 0.15s; }
.chat-close:hover { color: #f0f6fc; background: #21262d; }
.chat-me { padding: 10px 20px; background: #161b22; border-bottom: 1px solid #21262d; font-size: 12px; color: #6e7681; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.chat-me-dot { width: 8px; height: 8px; background: #3fb950; border-radius: 50%; flex-shrink: 0; }
.chat-me-addr { color: #58a6ff; font-weight: 700; font-size: 12px; font-family: monospace; }
.chat-messages { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 2px; scroll-behavior: smooth; }
.chat-messages::-webkit-scrollbar { width: 4px; }
.chat-messages::-webkit-scrollbar-track { background: transparent; }
.chat-messages::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
.chat-msg { display: flex; gap: 10px; padding: 8px 10px; border-radius: 10px; transition: background 0.1s; align-items: flex-start; }
.chat-msg:hover { background: #161b22; }
.chat-msg-avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, #1e40af, #7c3aed); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; color: #fff; flex-shrink: 0; margin-top: 1px; font-family: monospace; }
.chat-msg-body { flex: 1; min-width: 0; }
.chat-msg-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 3px; }
.chat-msg-name { font-weight: 700; color: #58a6ff; font-size: 13px; font-family: monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }
.chat-msg-time { font-size: 10px; color: #484f58; flex-shrink: 0; }
.chat-msg-text { color: #c9d1d9; font-size: 14px; line-height: 1.5; word-break: break-word; }
.chat-input-row { padding: 14px 16px; border-top: 1px solid #21262d; display: flex; gap: 10px; align-items: center; flex-shrink: 0; background: #0d1117; border-radius: 0 0 0 20px; }
.chat-input-wrap { flex: 1; position: relative; }
.chat-input { width: 100%; background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 11px 16px; color: #f0f6fc; font-size: 14px; outline: none; font-family: inherit; transition: border-color 0.2s, box-shadow 0.2s; }
.chat-input::placeholder { color: #484f58; }
.chat-input:focus { border-color: #388bfd; box-shadow: 0 0 0 3px rgba(56,139,253,0.1); }
.chat-send { background: linear-gradient(135deg, #1e40af, #3b82f6); border: none; border-radius: 12px; width: 44px; height: 44px; color: #fff; cursor: pointer; transition: opacity 0.2s, transform 0.15s; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.chat-send:hover { opacity: 0.85; transform: scale(1.05); }
.chat-send svg { width: 18px; height: 18px; }

/* Chat toggle button */
.chat-toggle { position: fixed; bottom: 24px; right: 24px; width: 56px; height: 56px; background: linear-gradient(135deg, #1e40af, #3b82f6); border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 24px rgba(59,130,246,0.4); z-index: 201; transition: transform 0.2s, box-shadow 0.2s; }
.chat-toggle:hover { transform: scale(1.1); box-shadow: 0 6px 28px rgba(59,130,246,0.6); }
.chat-toggle svg { width: 24px; height: 24px; color: #fff; }

/* Banner carousel */
.banner { position: relative; border-radius: 16px; overflow: hidden; margin-bottom: 48px; height: 280px; }
.banner-slide { display: none; width: 100%; height: 100%; position: absolute; inset: 0; }
.banner-slide.active { display: block; }
.banner-slide.dice-banner  { background: linear-gradient(135deg, #7f1d1d, #ef4444); }
.banner-slide.bj-banner    { background: linear-gradient(135deg, #14532d, #22c55e); }
.banner-slide.flip-banner  { background: linear-gradient(135deg, #6d28d9, #a78bfa); }
.banner-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; gap: 48px; padding: 0 48px; }
.banner-logo { height: 160px; width: 160px; object-fit: contain; flex-shrink: 0; }
.banner-content { display: flex; flex-direction: column; align-items: flex-start; gap: 12px; }
.banner-tag { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; opacity: 0.7; }
.banner-title { font-size: 32px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; text-shadow: 0 2px 8px rgba(0,0,0,0.3); }
.banner-btn { background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.5); border-radius: 8px; padding: 12px 32px; color: #fff; font-weight: 700; font-size: 15px; cursor: pointer; text-decoration: none; transition: all 0.2s; backdrop-filter: blur(4px); }
.banner-btn:hover { background: rgba(255,255,255,0.35); }
.banner-arrow { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.2); border: none; color: #fff; font-size: 22px; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; z-index: 10; }
.banner-arrow:hover { background: rgba(0,0,0,0.4); }
.banner-arrow.prev { left: 16px; }
.banner-arrow.next { right: 16px; }
.banner-dots { position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; }
.banner-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.4); cursor: pointer; transition: background 0.2s; }
.banner-dot.active { background: #fff; }

/* Section title */
.section-title { font-size: 26px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; text-align: center; margin-bottom: 20px; color: #fff; }

/* Games grid */
.games-grid { display: flex; justify-content: center; gap: 12px; margin-bottom: 48px; flex-wrap: wrap; }
.game-tile { width: 280px; height: 200px; flex-shrink: 0; border-radius: 16px; display: flex; align-items: center; justify-content: center; text-decoration: none; color: #fff; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; position: relative; overflow: hidden; }
.game-tile:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,0.5); }
.game-tile.dice-tile { background: linear-gradient(135deg, #7f1d1d, #ef4444); }
.game-tile.bj-tile   { background: linear-gradient(135deg, #14532d, #22c55e); }
.game-tile.flip-tile { background: linear-gradient(135deg, #6d28d9, #a78bfa); }
.game-tile img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; object-position: center; padding: 16px; }

/* Recent plays */
.plays-list { display: flex; flex-direction: column; gap: 8px; }
.play-row { background: #1a1f2e; border: 1px solid #2a2f3e; border-radius: 8px; padding: 12px 20px; display: flex; align-items: center; gap: 12px; font-size: 14px; }
.play-game { background: #2a2f3e; border-radius: 4px; padding: 2px 8px; font-size: 11px; font-weight: 700; color: #8b949e; text-transform: uppercase; }
.play-wallet { color: #fff; font-weight: 600; }
.play-won { color: #48bb78; font-weight: 700; }
.play-lost { color: #f56565; font-weight: 700; }
.play-amount { background: #2a2f3e; border-radius: 4px; padding: 2px 8px; font-size: 12px; font-weight: 700; display: flex; align-items: center; gap: 4px; }
.play-time { margin-left: auto; color: #8b949e; font-size: 12px; }

.toast { position: fixed; top: 92px; right: 20px; background: #1a1f2e; border: 1px solid #2a2f3e; border-radius: 8px; padding: 12px 16px; color: #fff; font-size: 14px; font-weight: 500; z-index: 1000; animation: slideIn 0.3s ease-out; }
.toast.success { border-color: #48bb78; background: rgba(72,187,120,0.08); }
@keyframes slideIn { from { transform: translateX(110%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

@media(max-width:700px) { .games-grid { gap: 8px; } .game-tile { width: 150px; } .banner { height: 220px; } }
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <a class="logo-link" href="/"><img class="logo-img" src="/assets/Free Dice.png" alt="FreeDice"></a>
    <nav class="nav-tabs">
      <div class="nav-tab">
        Originals
        <div class="dropdown">
          <div class="dropdown-inner">
            <a class="dropdown-item" href="/blackjack">Blackjack</a>
            <a class="dropdown-item" href="/dice">Dice</a>
            <a class="dropdown-item" href="/flip">Flip</a>
          </div>
        </div>
      </div>
      <a class="nav-tab" href="/">Casino</a>
      <a class="nav-tab" href="#">Sports</a>
    </nav>
  </div>
  <div class="header-right">
    <div class="balance-display">
      <img src="https://raw.githubusercontent.com/solana-labs/token-list/main/assets/mainnet/So11111111111111111111111111111111111111112/logo.png" style="width:18px;height:18px;border-radius:50%;flex-shrink:0;">
      <span id="balDisplay">0.0000 SOL</span>
    </div>
    <button class="connect-btn" id="connectBtn">Connect Wallet</button>
  </div>
</header>

<div class="page-layout">
  <div class="page-content">

  <!-- Banner -->
  <div class="banner">
    <div class="banner-slide dice-banner active">
      <div class="banner-overlay">
        <img class="banner-logo" src="/assets/dice.png" alt="Dice">
        <div class="banner-content">
          <div class="banner-tag">FreeDice Original</div>
          <div class="banner-title">Play Dice &mdash; Up to 98x</div>
          <a class="banner-btn" href="/dice">Play Now</a>
        </div>
      </div>
    </div>
    <div class="banner-slide bj-banner">
      <div class="banner-overlay">
        <img class="banner-logo" src="/assets/blackjack.png" alt="Blackjack">
        <div class="banner-content">
          <div class="banner-tag">FreeDice Original</div>
          <div class="banner-title">New Game: Blackjack</div>
          <a class="banner-btn" href="/blackjack">Play Now</a>
        </div>
      </div>
    </div>
    <div class="banner-slide flip-banner">
      <div class="banner-overlay">
        <img class="banner-logo" src="/assets/flip.png" alt="Flip">
        <div class="banner-content">
          <div class="banner-tag">FreeDice Original</div>
          <div class="banner-title">Coin Flip &mdash; 2x Your SOL</div>
          <a class="banner-btn" href="/flip">Play Now</a>
        </div>
      </div>
    </div>
    <button class="banner-arrow prev" onclick="slideBanner(-1)">&#8249;</button>
    <button class="banner-arrow next" onclick="slideBanner(1)">&#8250;</button>
    <div class="banner-dots">
      <div class="banner-dot active" onclick="goSlide(0)"></div>
      <div class="banner-dot" onclick="goSlide(1)"></div>
      <div class="banner-dot" onclick="goSlide(2)"></div>
    </div>
  </div>

  <!-- Games -->
  <div class="section-title">FreeDice Originals</div>
  <div class="games-grid">
    <a class="game-tile dice-tile" href="/dice"><img src="/assets/dice.png" alt="Dice"></a>
    <a class="game-tile bj-tile" href="/blackjack"><img src="/assets/blackjack.png" alt="Blackjack"></a>
    <a class="game-tile flip-tile" href="/flip"><img src="/assets/flip.png" alt="Flip"></a>
  </div>

  <!-- Recent Bets -->
  <div class="section-title">Recent Bets</div>
  <div class="plays-list" id="betsFeed">
    <div class="play-row" style="justify-content:center;color:#8b949e;">No bets yet</div>
  </div>

  </div><!-- end page-content -->

  <!-- Chat Popup -->
  <div class="chat-popup" id="chatPopup">
    <div class="chat-header">
      <div class="chat-header-left">
        <div class="chat-header-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
        <span class="chat-header-title">Live Chat</span>
      </div>
      <div style="display:flex;align-items:center;gap:12px;">
        <span class="chat-online" id="onlineCount">0 online</span>
        <button class="chat-close" onclick="document.getElementById('chatPopup').classList.remove('open')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>
    <div class="chat-me"><div class="chat-me-dot"></div>Chatting as <span class="chat-me-addr" id="chatMeAddr">Not connected</span></div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-row">
      <div class="chat-input-wrap">
        <input class="chat-input" id="chatInput" placeholder="Type a message..." maxlength="200">
      </div>
      <button class="chat-send" id="chatSend">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>

  <!-- Chat Toggle Button -->
  <button class="chat-toggle" id="chatToggle">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
  </button>
</div><!-- end page-layout -->

<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
<script src="/js/solana.js"></script>
<script>
// Banner
let slide = 0;
const slides = document.querySelectorAll('.banner-slide');
const dots = document.querySelectorAll('.banner-dot');
function goSlide(n) {
  slides[slide].classList.remove('active');
  dots[slide].classList.remove('active');
  slide = (n + slides.length) % slides.length;
  slides[slide].classList.add('active');
  dots[slide].classList.add('active');
}
function slideBanner(dir) { goSlide(slide + dir); }
setInterval(() => slideBanner(1), 5000);

// Recent Bets
function timeSince(ts) {
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  return Math.floor(s/3600) + 'h ago';
}
function renderBets(bets) {
  const feed = document.getElementById('betsFeed');
  if (!bets.length) return;
  feed.innerHTML = bets.map(b => `
    <div class="play-row">
      <span class="play-game">${b.game}</span>
      <span class="play-wallet">${b.wallet}</span>
      <span class="play-amount">${b.amount.toFixed(4)} SOL</span>
      <span style="color:#fff;font-weight:700;">${b.won ? b.multiplier.toFixed(2) + 'x' : '0x'}</span>
      <span class="play-time">${timeSince(b.ts)}</span>
    </div>`).join('');
}
async function loadBets() {
  try {
    const r = await fetch('/api/bets');
    renderBets(await r.json());
  } catch(_) {}
}
loadBets();
setInterval(loadBets, 5000);

// Live bets + Chat via WebSocket
let chatWs;
function connectChat() {
  chatWs = new WebSocket(`ws://${location.host}`);
  chatWs.onmessage = e => {
    const d = JSON.parse(e.data);
    if (d.type === 'bet') { loadBets(); }
    if (d.type === 'users') document.getElementById('onlineCount').textContent = d.count + ' online';
    if (d.type === 'chat') appendMsg(d);
    if (d.type === 'history') d.messages.forEach(appendMsg);
  };
  chatWs.onopen = () => {
    const addr = typeof FreeDiceSolana !== 'undefined' && FreeDiceSolana.isConnected() ? FreeDiceSolana.getPublicKey() : null;
    const display = addr ? addr.slice(0,6) + '...' + addr.slice(-4) : null;
    if (display) document.getElementById('chatMeAddr').textContent = display;
    chatWs.send(JSON.stringify({ type: 'identify', wallet: addr }));
  };
  chatWs.onclose = () => setTimeout(connectChat, 2000);
}
function appendMsg(msg) {
  const box = document.getElementById('chatMessages');
  const el = document.createElement('div');
  el.className = 'chat-msg';
  const initials = msg.name.slice(0,2).toUpperCase();
  const time = new Date(msg.ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  el.innerHTML = `
    <div class="chat-msg-avatar">${initials}</div>
    <div class="chat-msg-body">
      <div class="chat-msg-header">
        <span class="chat-msg-name">${msg.name}</span>
        <span class="chat-msg-time">${time}</span>
      </div>
      <div class="chat-msg-text">${msg.text.replace(/</g,'&lt;')}</div>
    </div>`;
  box.appendChild(el);
  box.scrollTop = box.scrollHeight;
}
function sendChat() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text || !chatWs || chatWs.readyState !== 1) return;
  chatWs.send(JSON.stringify({ type: 'chat', text }));
  input.value = '';
}
document.getElementById('chatSend').addEventListener('click', sendChat);
document.getElementById('chatInput').addEventListener('keydown', e => { if (e.key === 'Enter') sendChat(); });
document.getElementById('chatToggle').addEventListener('click', () => {
  document.getElementById('chatPopup').classList.toggle('open');
});
try { connectChat(); } catch(_) {}

// Wallet
window.addEventListener('load', async () => {
  await FreeDiceSolana.initSolana();
  const btn = document.getElementById('connectBtn');
  const bal = document.getElementById('balDisplay');
  if (FreeDiceSolana.isConnected()) {
    const addr = FreeDiceSolana.getPublicKey();
    btn.textContent = addr.slice(0,4) + '...' + addr.slice(-4);
    const b = await FreeDiceSolana.getSolBalance();
    bal.textContent = b.toFixed(4) + ' SOL';
  }
  btn.addEventListener('click', async () => {
    if (FreeDiceSolana.isConnected()) return;
    btn.textContent = 'Connecting...';
    try {
      await FreeDiceSolana.connectWallet();
      const b = await FreeDiceSolana.getSolBalance();
      bal.textContent = b.toFixed(4) + ' SOL';
      const addr = FreeDiceSolana.getPublicKey();
      btn.textContent = addr.slice(0,4) + '...' + addr.slice(-4);
      // Update chat identity after wallet connect
      if (chatWs && chatWs.readyState === 1) {
        chatWs.send(JSON.stringify({ type: 'identify', wallet: addr }));
        document.getElementById('chatMeAddr').textContent = addr.slice(0,4) + '...' + addr.slice(-4);
      }
    } catch(e) { btn.textContent = 'Connect Wallet'; }
  });
});
