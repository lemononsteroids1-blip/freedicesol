<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FreeDice Casino</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: "Inter", sans-serif; background: #0a0e13; color: #fff; min-height: 100vh; }

/* Header */
.header { padding: 0 24px; background: #1a1f2e; display: flex; justify-content: space-between; align-items: center; height: 78px; position: sticky; top: 0; z-index: 50; }
.header-left { display: flex; align-items: center; }
.logo-link { display: inline-flex; align-items: center; text-decoration: none; }
.logo-img { height: 72px; width: auto; display: block; }
.nav-tabs { display: flex; align-items: center; gap: 4px; margin-left: 24px; }
.nav-tab { display: inline-flex; align-items: center; padding: 8px 16px; border-radius: 8px; font-size: 14px; font-weight: 600; color: #8b949e; text-decoration: none; border: none; background: none; cursor: pointer; transition: all 0.15s; position: relative; }
.nav-tab:hover { background: #2a2f3e; color: #fff; }
.nav-tab .dropdown { display: none; position: absolute; top: 100%; left: 0; padding-top: 8px; min-width: 160px; z-index: 100; }
.nav-tab:hover .dropdown { display: flex; flex-direction: column; }
.dropdown-inner { background: #1a1f2e; border: 1px solid #2a2f3e; border-radius: 10px; padding: 6px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); display: flex; flex-direction: column; }
.dropdown-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 7px; color: #cdd5e0; font-size: 14px; font-weight: 600; text-decoration: none; transition: background 0.15s; }
.dropdown-item:hover { background: #2a2f3e; color: #fff; }
.header-right { display: flex; align-items: center; gap: 12px; }
.balance-display { background: #2a2f3e; border: 1px solid #3a3f4e; border-radius: 8px; padding: 10px 18px; display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 15px; color: #fff; height: 44px; }
.connect-btn { background: #1e40af; border: none; border-radius: 8px; padding: 10px 22px; color: #fff; font-weight: 600; cursor: pointer; font-size: 15px; height: 44px; transition: background 0.2s; }
.connect-btn:hover { background: #1d4ed8; }

/* Social buttons */
.social-btns { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 10px; z-index: 100; }
.social-btn { width: 48px; height: 48px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.2s, box-shadow 0.2s; text-decoration: none; }
.social-btn:hover { transform: scale(1.12); }
.social-btn.twitter { background: #000; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
.social-btn.discord { background: #5865f2; box-shadow: 0 4px 16px rgba(88,101,242,0.4); }
.social-btn svg { width: 22px; height: 22px; fill: #fff; }

/* Layout with chat */
.page-layout { display: flex; align-items: flex-start; min-height: calc(100vh - 78px); }
.page-content { flex: 1; min-width: 0; padding: 40px 32px 60px; }



/* Banner carousel */
.banner { position: relative; border-radius: 16px; overflow: hidden; margin-bottom: 48px; height: 280px; }
.banner-slide { display: none; width: 100%; height: 100%; position: absolute; inset: 0; }
.banner-slide.active { display: block; }
.banner-slide.dice-banner  { background: linear-gradient(135deg, #7f1d1d, #ef4444); }
.banner-slide.bj-banner    { background: linear-gradient(135deg, #14532d, #22c55e); }
.banner-slide.flip-banner  { background: linear-gradient(135deg, #6d28d9, #a78bfa); }
.banner-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; gap: 48px; padding: 0 48px; }
.banner-logo { height: 160px; width: 160px; object-fit: contain; flex-shrink: 0; }
.banner-content { display: flex; flex-direction: column; align-items: flex-start; gap: 12px; }
.banner-tag { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; opacity: 0.7; }
.banner-title { font-size: 32px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; text-shadow: 0 2px 8px rgba(0,0,0,0.3); }
.banner-btn { background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.5); border-radius: 8px; padding: 12px 32px; color: #fff; font-weight: 700; font-size: 15px; cursor: pointer; text-decoration: none; transition: all 0.2s; backdrop-filter: blur(4px); }
.banner-btn:hover { background: rgba(255,255,255,0.35); }
.banner-arrow { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.2); border: none; color: #fff; font-size: 22px; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; z-index: 10; }
.banner-arrow:hover { background: rgba(0,0,0,0.4); }
.banner-arrow.prev { left: 16px; }
.banner-arrow.next { right: 16px; }
.banner-dots { position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; }
.banner-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.4); cursor: pointer; transition: background 0.2s; }
.banner-dot.active { background: #fff; }

/* Section title */
.section-title { font-size: 26px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; text-align: center; margin-bottom: 20px; color: #fff; }

/* Games grid */
.games-grid { display: flex; justify-content: center; gap: 12px; margin-bottom: 48px; flex-wrap: wrap; }
.game-tile { width: 280px; height: 200px; flex-shrink: 0; border-radius: 16px; display: flex; align-items: center; justify-content: center; text-decoration: none; color: #fff; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; position: relative; overflow: hidden; }
.game-tile:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,0.5); }
.game-tile.dice-tile { background: linear-gradient(135deg, #7f1d1d, #ef4444); }
.game-tile.bj-tile   { background: linear-gradient(135deg, #14532d, #22c55e); }
.game-tile.flip-tile { background: linear-gradient(135deg, #6d28d9, #a78bfa); }
.game-tile img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; object-position: center; padding: 16px; }

/* Recent plays */
.plays-list { display: flex; flex-direction: column; gap: 8px; }
.play-row { background: #1a1f2e; border: 1px solid #2a2f3e; border-radius: 8px; padding: 12px 20px; display: flex; align-items: center; gap: 12px; font-size: 14px; }
.play-game { background: #2a2f3e; border-radius: 4px; padding: 2px 8px; font-size: 11px; font-weight: 700; color: #8b949e; text-transform: uppercase; }
.play-wallet { color: #fff; font-weight: 600; }
.play-won { color: #48bb78; font-weight: 700; }
.play-lost { color: #f56565; font-weight: 700; }
.play-amount { background: #2a2f3e; border-radius: 4px; padding: 2px 8px; font-size: 12px; font-weight: 700; display: flex; align-items: center; gap: 4px; }
.play-time { margin-left: auto; color: #8b949e; font-size: 12px; }

.toast { position: fixed; top: 92px; right: 20px; background: #1a1f2e; border: 1px solid #2a2f3e; border-radius: 8px; padding: 12px 16px; color: #fff; font-size: 14px; font-weight: 500; z-index: 1000; animation: slideIn 0.3s ease-out; }
.toast.success { border-color: #48bb78; background: rgba(72,187,120,0.08); }
@keyframes slideIn { from { transform: translateX(110%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

@media(max-width:700px) { .games-grid { gap: 8px; } .game-tile { width: 150px; } .banner { height: 220px; } }
</style>
</head>
<body>

    <nav class="nav-tabs">
      <div class="nav-tab">

<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
<script src="/js/solana.js"></script>
<script>
// Banner
let slide = 0;
const slides = document.querySelectorAll('.banner-slide');
const dots = document.querySelectorAll('.banner-dot');
function goSlide(n) {
  slides[slide].classList.remove('active');
  dots[slide].classList.remove('active');
  slide = (n + slides.length) % slides.length;
  slides[slide].classList.add('active');
  dots[slide].classList.add('active');
}
function slideBanner(dir) { goSlide(slide + dir); }
setInterval(() => slideBanner(1), 5000);

// Recent Bets
function timeSince(ts) {
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  return Math.floor(s/3600) + 'h ago';
}
function renderBets(bets) {
  const feed = document.getElementById('betsFeed');
  if (!bets.length) return;
  feed.innerHTML = bets.map(b => `
    <div class="play-row">
      <span class="play-game">${b.game}</span>
      <span class="play-wallet">${b.wallet}</span>
      <span class="play-amount">${b.amount.toFixed(4)} SOL</span>
      <span style="color:#fff;font-weight:700;">${b.won ? b.multiplier.toFixed(2) + 'x' : '0x'}</span>
      <span class="play-time">${timeSince(b.ts)}</span>
    </div>`).join('');
}
async function loadBets() {
  try {
    const r = await fetch('/api/bets');
    renderBets(await r.json());
  } catch(_) {}
}
loadBets();
setInterval(loadBets, 5000);

// Live bets via WebSocket
try {
  const ws = new WebSocket(`ws://${location.host}`);
  ws.onmessage = e => { const d = JSON.parse(e.data); if (d.type === 'bet') loadBets(); };
} catch(_) {}

// Wallet
window.addEventListener('load', async () => {
  await FreeDiceSolana.initSolana();
  const btn = document.getElementById('connectBtn');
  const bal = document.getElementById('balDisplay');
  if (FreeDiceSolana.isConnected()) {
    const addr = FreeDiceSolana.getPublicKey();
    btn.textContent = addr.slice(0,4) + '...' + addr.slice(-4);
    const b = await FreeDiceSolana.getSolBalance();
    bal.textContent = b.toFixed(4) + ' SOL';
  }
  btn.addEventListener('click', async () => {
    if (FreeDiceSolana.isConnected()) return;
    btn.textContent = 'Connecting...';
    try {
      await FreeDiceSolana.connectWallet();
      const b = await FreeDiceSolana.getSolBalance();
      bal.textContent = b.toFixed(4) + ' SOL';
      const addr = FreeDiceSolana.getPublicKey();
      btn.textContent = addr.slice(0,4) + '...' + addr.slice(-4);
      // Update chat identity after wallet connect
      if (chatWs && chatWs.readyState === 1) {
        chatWs.send(JSON.stringify({ type: 'identify', wallet: addr }));
        document.getElementById('chatMeAddr').textContent = addr.slice(0,4) + '...' + addr.slice(-4);
      }
    } catch(e) { btn.textContent = 'Connect Wallet'; }
  });
});
</script>
</body>
