<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FreeDice Casino</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: "Inter", sans-serif; background: #0a0e13; color: #fff; min-height: 100vh; }

/* Header */
.header { padding: 0 24px; background: #1a1f2e; display: flex; justify-content: space-between; align-items: center; height: 78px; border-bottom: 1px solid #2a2f3e; position: sticky; top: 0; z-index: 50; }
.header-left { display: flex; align-items: center; }
.logo-link { display: inline-flex; align-items: center; text-decoration: none; }
.logo-img { height: 72px; width: auto; display: block; }
.nav-tabs { display: flex; align-items: center; gap: 4px; margin-left: 24px; }
.nav-tab { display: inline-flex; align-items: center; padding: 8px 16px; border-radius: 8px; font-size: 14px; font-weight: 600; color: #8b949e; text-decoration: none; border: none; background: none; cursor: pointer; transition: all 0.15s; position: relative; }
.nav-tab:hover { background: #2a2f3e; color: #fff; }
.nav-tab .dropdown { display: none; position: absolute; top: 100%; left: 0; padding-top: 8px; min-width: 160px; z-index: 100; }
.nav-tab:hover .dropdown { display: flex; flex-direction: column; }
.dropdown-inner { background: #1a1f2e; border: 1px solid #2a2f3e; border-radius: 10px; padding: 6px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); display: flex; flex-direction: column; }
.dropdown-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 7px; color: #cdd5e0; font-size: 14px; font-weight: 600; text-decoration: none; transition: background 0.15s; }
.dropdown-item:hover { background: #2a2f3e; color: #fff; }
.header-right { display: flex; align-items: center; gap: 12px; }
.balance-display { background: #2a2f3e; border: 1px solid #3a3f4e; border-radius: 8px; padding: 10px 18px; display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 15px; color: #fff; height: 44px; }
.connect-btn { background: #1e40af; border: none; border-radius: 8px; padding: 10px 22px; color: #fff; font-weight: 600; cursor: pointer; font-size: 15px; height: 44px; transition: background 0.2s; }
.connect-btn:hover { background: #1d4ed8; }

/* Main */
main { max-width: 1100px; margin: 0 auto; padding: 40px 24px 60px; }

/* Banner carousel */
.banner { position: relative; border-radius: 16px; overflow: hidden; margin-bottom: 48px; height: 280px; background: #1a1f2e; }
.banner-slide { display: none; width: 100%; height: 100%; position: absolute; inset: 0; }
.banner-slide.active { display: block; }
.banner-bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: center; }
.banner-overlay { position: absolute; inset: 0; background: linear-gradient(to right, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.2) 60%, transparent 100%); display: flex; align-items: center; padding: 0 48px; }
.banner-content { display: flex; flex-direction: column; align-items: flex-start; gap: 12px; }
.banner-title { font-size: 32px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; text-shadow: 0 2px 8px rgba(0,0,0,0.6); }
.banner-btn { background: #1e40af; border: none; border-radius: 8px; padding: 12px 32px; color: #fff; font-weight: 700; font-size: 15px; cursor: pointer; text-decoration: none; transition: background 0.2s; }
.banner-btn:hover { background: #1d4ed8; }
.banner-arrow { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.1); border: none; color: #fff; font-size: 22px; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; z-index: 10; }
.banner-arrow:hover { background: rgba(255,255,255,0.2); }
.banner-arrow.prev { left: 16px; }
.banner-arrow.next { right: 16px; }
.banner-dots { position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; }
.banner-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.3); cursor: pointer; transition: background 0.2s; }
.banner-dot.active { background: #fff; }

/* Section title */
.section-title { font-size: 18px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; text-align: center; margin-bottom: 20px; color: #fff; }

/* Games grid */
.games-grid { display: flex; justify-content: center; gap: 12px; margin-bottom: 48px; flex-wrap: wrap; }
.game-tile { width: 200px; height: 160px; flex-shrink: 0; border-radius: 12px; display: flex; align-items: center; justify-content: center; text-decoration: none; color: #fff; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; position: relative; overflow: hidden; background: #1a1f2e; }
.game-tile:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
.game-tile img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: center; }

/* Recent plays */
.plays-list { display: flex; flex-direction: column; gap: 8px; }
.play-row { background: #1a1f2e; border: 1px solid #2a2f3e; border-radius: 8px; padding: 12px 20px; display: flex; align-items: center; gap: 12px; font-size: 14px; }
.play-game { background: #2a2f3e; border-radius: 4px; padding: 2px 8px; font-size: 11px; font-weight: 700; color: #8b949e; text-transform: uppercase; }
.play-wallet { color: #3b82f6; font-weight: 600; }
.play-won { color: #48bb78; font-weight: 700; }
.play-lost { color: #f56565; font-weight: 700; }
.play-amount { background: #2a2f3e; border-radius: 4px; padding: 2px 8px; font-size: 12px; font-weight: 700; display: flex; align-items: center; gap: 4px; }
.play-time { margin-left: auto; color: #8b949e; font-size: 12px; }

.toast { position: fixed; top: 92px; right: 20px; background: #1a1f2e; border: 1px solid #2a2f3e; border-radius: 8px; padding: 12px 16px; color: #fff; font-size: 14px; font-weight: 500; z-index: 1000; animation: slideIn 0.3s ease-out; }
.toast.success { border-color: #48bb78; background: rgba(72,187,120,0.08); }
@keyframes slideIn { from { transform: translateX(110%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

@media(max-width:700px) { .games-grid { gap: 8px; } .game-tile { width: 150px; } .banner { height: 220px; } }
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <a class="logo-link" href="/"><img class="logo-img" src="/assets/Free Dice.png" alt="FreeDice"></a>
    <nav class="nav-tabs">
      <div class="nav-tab">
        Originals
        <div class="dropdown">
          <div class="dropdown-inner">
            <a class="dropdown-item" href="/blackjack">Blackjack</a>
            <a class="dropdown-item" href="/dice">Dice</a>
            <a class="dropdown-item" href="/flip">Flip</a>
          </div>
        </div>
      </div>
      <a class="nav-tab" href="/">Casino</a>
      <a class="nav-tab" href="#">Sports</a>
    </nav>
  </div>
  <div class="header-right">
    <div class="balance-display">
      <img src="https://raw.githubusercontent.com/solana-labs/token-list/main/assets/mainnet/So11111111111111111111111111111111111111112/logo.png" style="width:18px;height:18px;border-radius:50%;flex-shrink:0;">
      <span id="balDisplay">0.0000 SOL</span>
    </div>
    <button class="connect-btn" id="connectBtn">Connect Wallet</button>
  </div>
</header>

<main>

  <!-- Banner -->
  <div class="banner">
    <div class="banner-slide active">
      <img class="banner-bg" src="/assets/dice.png" alt="Dice">
      <div class="banner-overlay">
        <div class="banner-content">
          <div class="banner-title">Play Dice — Up to 98x</div>
          <a class="banner-btn" href="/dice">Play Now</a>
        </div>
      </div>
    </div>
    <div class="banner-slide">
      <img class="banner-bg" src="/assets/blackjack.png" alt="Blackjack">
      <div class="banner-overlay">
        <div class="banner-content">
          <div class="banner-title">New Game: Blackjack</div>
          <a class="banner-btn" href="/blackjack">Play Now</a>
        </div>
      </div>
    </div>
    <div class="banner-slide">
      <img class="banner-bg" src="/assets/flip.png" alt="Flip">
      <div class="banner-overlay">
        <div class="banner-content">
          <div class="banner-title">Coin Flip — 2x Your SOL</div>
          <a class="banner-btn" href="/flip">Play Now</a>
        </div>
      </div>
    </div>
    <button class="banner-arrow prev" onclick="slideBanner(-1)">&#8249;</button>
    <button class="banner-arrow next" onclick="slideBanner(1)">&#8250;</button>
    <div class="banner-dots">
      <div class="banner-dot active" onclick="goSlide(0)"></div>
      <div class="banner-dot" onclick="goSlide(1)"></div>
      <div class="banner-dot" onclick="goSlide(2)"></div>
    </div>
  </div>

  <!-- Games -->
  <div class="section-title">FreeDice Originals</div>
  <div class="games-grid">
    <a class="game-tile" href="/dice"><img src="/assets/dice.png" alt="Dice"></a>
    <a class="game-tile" href="/blackjack"><img src="/assets/blackjack.png" alt="Blackjack"></a>
    <a class="game-tile" href="/flip"><img src="/assets/flip.png" alt="Flip"></a>
  </div>



</main>

<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
<script src="/js/solana.js"></script>
<script>
// Banner
let slide = 0;
const slides = document.querySelectorAll('.banner-slide');
const dots = document.querySelectorAll('.banner-dot');
function goSlide(n) {
  slides[slide].classList.remove('active');
  dots[slide].classList.remove('active');
  slide = (n + slides.length) % slides.length;
  slides[slide].classList.add('active');
  dots[slide].classList.add('active');
}
function slideBanner(dir) { goSlide(slide + dir); }
setInterval(() => slideBanner(1), 5000);

// Wallet
window.addEventListener('load', async () => {
  await FreeDiceSolana.initSolana();
  const btn = document.getElementById('connectBtn');
  const bal = document.getElementById('balDisplay');
  if (FreeDiceSolana.isConnected()) {
    const addr = FreeDiceSolana.getPublicKey();
    btn.textContent = addr.slice(0,4) + '...' + addr.slice(-4);
    const b = await FreeDiceSolana.getSolBalance();
    bal.textContent = b.toFixed(4) + ' SOL';
  }
  btn.addEventListener('click', async () => {
    if (FreeDiceSolana.isConnected()) return;
    btn.textContent = 'Connecting...';
    try {
      await FreeDiceSolana.connectWallet();
      const b = await FreeDiceSolana.getSolBalance();
      bal.textContent = b.toFixed(4) + ' SOL';
      const addr = FreeDiceSolana.getPublicKey();
      btn.textContent = addr.slice(0,4) + '...' + addr.slice(-4);
    } catch(e) { btn.textContent = 'Connect Wallet'; }
  });
});
</script>
</body>
</html>
